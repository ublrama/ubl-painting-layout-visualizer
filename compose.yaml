services:
  painting-layout-dev:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  painting-layout-prod:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    profiles:
      - prod
